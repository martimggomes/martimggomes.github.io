<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV | Martim Gomes</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #fafafa;
            color: #2c2c2c;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .message-box {
            background: #ffffff;
            padding: 4rem 3rem;
            border-radius: 12px;
            border-top: 4px solid #D4AF37;
            box-shadow: 0 8px 30px rgba(0,0,0,0.04);
            max-width: 500px;
        }
        h1 {
            color: #D4AF37;
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 2rem;
        }
        p {
            color: #666666;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }
        a {
            display: inline-block;
            padding: 10px 25px;
            color: #D4AF37;
            text-decoration: none;
            border: 2px solid #D4AF37;
            border-radius: 30px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        a:hover {
            background-color: #D4AF37;
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="message-box">
        <h1>CV em desenvolvimento</h1>
        <p>O meu currículo está a ser atualizado e estará disponível para download muito em breve.</p>
        <a href="javascript:window.close();">Fechar Janela</a>
    </div>

</body>
</html>
